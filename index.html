<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Чат · реальное время</title>
</head>
<body>
    <div id="app">
        <!-- панель входа -->
        <div id="loginPanel">
            <h3>Вход через GitHub</h3>
            <button id="githubLoginBtn">🔐 Войти через GitHub</button>
            <p id="loginStatus" style="margin-top: 0.5rem; font-family: monospace;"></p>
        </div>

        <!-- панель чата -->
        <div id="chatPanel" style="display: none;">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding-bottom: 4px;">
                <span><strong>💬 Чат · реальное время</strong></span>
                <span id="userDisplay" style="font-size: 0.9rem;"></span>
                <button id="logoutBtn" style="font-size: 0.8rem;">🚪 выйти</button>
            </div>
            <div id="messageArea" style="height: 260px; overflow-y: auto; border: 1px solid #ddd; margin: 8px 0; padding: 4px; background: #fafafa; font-family: sans-serif; font-size: 0.95rem;"></div>
            <div style="display: flex; gap: 4px;">
                <input id="messageInput" type="text" placeholder="Введите сообщение..." style="flex: 1; padding: 6px; font-size: 1rem;">
                <button id="sendBtn">Отправить</button>
            </div>
            <div style="margin-top: 4px; font-size: 0.8rem; color: #555;">
                <span id="connectionStatus">⚡ подключение…</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ⚠️ ЗАМЕНИТЕ НА ВАШ CLIENT ID ИЗ НАСТРОЕК GITHUB
            const GITHUB_CLIENT_ID = 'ВАШ_CLIENT_ID_ЗДЕСЬ';
            const REDIRECT_URI = window.location.origin + window.location.pathname;
            const WEBSOCKET_URL = 'wss://echo.websocket.org';

            // DOM элементы
            const loginPanel = document.getElementById('loginPanel');
            const chatPanel = document.getElementById('chatPanel');
            const loginBtn = document.getElementById('githubLoginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const messageArea = document.getElementById('messageArea');
            const userDisplay = document.getElementById('userDisplay');
            const loginStatus = document.getElementById('loginStatus');
            const connectionStatus = document.getElementById('connectionStatus');

            let currentUser = null;
            let ws = null;
            let reconnectTimer = null;

            function appendMessage(text, isSystem = false) {
                const div = document.createElement('div');
                div.textContent = text;
                if (isSystem) {
                    div.style.color = '#4a6a8f';
                    div.style.fontStyle = 'italic';
                    div.style.fontSize = '0.85rem';
                } else {
                    div.style.margin = '2px 0';
                    div.style.borderBottom = '1px solid #eaeaea';
                    div.style.padding = '2px 0';
                }
                messageArea.appendChild(div);
                messageArea.scrollTop = messageArea.scrollHeight;
            }

            function connectWebSocket() {
                if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                    return;
                }

                try {
                    ws = new WebSocket(WEBSOCKET_URL);
                    connectionStatus.textContent = '🔄 подключение…';

                    ws.onopen = function() {
                        connectionStatus.textContent = '✅ подключено (эхо-сервер)';
                        if (currentUser) {
                            ws.send(`👤 ${currentUser.login} присоединился`);
                        }
                        if (reconnectTimer) {
                            clearTimeout(reconnectTimer);
                            reconnectTimer = null;
                        }
                    };

                    ws.onmessage = function(event) {
                        let msg = event.data;
                        if (msg.startsWith('👤')) {
                            appendMessage('🔹 ' + msg.substring(2), true);
                        } else {
                            if (window._lastSent && msg === window._lastSent) {
                                appendMessage('🗣️ Вы: ' + msg);
                            } else {
                                appendMessage('👤 другой: ' + msg);
                            }
                        }
                    };

                    ws.onerror = function(err) {
                        connectionStatus.textContent = '⚠️ Ошибка WebSocket';
                        console.warn('WS error:', err);
                    };

                    ws.onclose = function() {
                        connectionStatus.textContent = '🔴 отключено – переподключение…';
                        if (!reconnectTimer) {
                            reconnectTimer = setTimeout(() => {
                                reconnectTimer = null;
                                if (currentUser) {
                                    connectWebSocket();
                                } else {
                                    connectionStatus.textContent = '⏸️ выход';
                                }
                            }, 2000);
                        }
                    };
                } catch (e) {
                    connectionStatus.textContent = '❌ ошибка подключения';
                    console.error('WebSocket init error:', e);
                }
            }

            function disconnectWebSocket() {
                if (ws) {
                    try {
                        ws.close();
                    } catch (e) {}
                    ws = null;
                }
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
                connectionStatus.textContent = '⏸️ отключено';
            }

            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text || !ws || ws.readyState !== WebSocket.OPEN) {
                    if (!currentUser) {
                        appendMessage('⚠️ Сначала войдите в систему.', true);
                    } else {
                        appendMessage('⚠️ Нет подключения к чату.', true);
                    }
                    return;
                }
                window._lastSent = text;
                ws.send(text);
                messageInput.value = '';
                
                if (window._echoTimeout) clearTimeout(window._echoTimeout);
                window._echoTimeout = setTimeout(() => {
                    if (window._lastSent === text) {
                        appendMessage('🗣️ Вы (отправлено): ' + text);
                        window._lastSent = null;
                    }
                }, 1500);
            }

            function loginWithGitHub() {
                const state = Math.random().toString(36).substring(2, 10);
                sessionStorage.setItem('gh_oauth_state', state);
                const params = new URLSearchParams({
                    client_id: GITHUB_CLIENT_ID,
                    redirect_uri: REDIRECT_URI,
                    state: state,
                    scope: 'read:user',
                    response_type: 'token',
                });
                window.location.href = 'https://github.com/login/oauth/authorize?' + params.toString();
            }

            function handleOAuthCallback() {
                const hash = window.location.hash.substring(1);
                if (!hash) return false;
                const params = new URLSearchParams(hash);
                const accessToken = params.get('access_token');
                const state = params.get('state');
                const storedState = sessionStorage.getItem('gh_oauth_state');
                if (!accessToken) return false;
                if (state !== storedState) {
                    loginStatus.textContent = '❌ Ошибка проверки состояния. Попробуйте снова.';
                    return false;
                }
                sessionStorage.removeItem('gh_oauth_state');
                
                fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${accessToken}`,
                        'Accept': 'application/json'
                    }
                })
                .then(res => {
                    if (!res.ok) throw new Error('Ошибка GitHub API');
                    return res.json();
                })
                .then(user => {
                    currentUser = {
                        login: user.login,
                        name: user.name || user.login,
                        avatar_url: user.avatar_url,
                        id: user.id
                    };
                    sessionStorage.setItem('gh_user', JSON.stringify(currentUser));
                    window.history.replaceState(null, '', window.location.pathname);
                    showChat();
                    connectWebSocket();
                    appendMessage(`👋 Добро пожаловать, ${currentUser.name} (${currentUser.login})`, true);
                    appendMessage('💡 Это публичный эхо-сервер – все сообщения возвращаются только вам.', true);
                })
                .catch(err => {
                    loginStatus.textContent = '❌ Не удалось получить данные пользователя: ' + err.message;
                    console.error(err);
                });
                return true;
            }

            function showChat() {
                loginPanel.style.display = 'none';
                chatPanel.style.display = 'block';
                if (currentUser) {
                    userDisplay.textContent = `👤 ${currentUser.login}`;
                }
                messageInput.focus();
            }

            function showLogin() {
                chatPanel.style.display = 'none';
                loginPanel.style.display = 'block';
                disconnectWebSocket();
                currentUser = null;
                sessionStorage.removeItem('gh_user');
                messageArea.innerHTML = '';
                userDisplay.textContent = '';
                loginStatus.textContent = '';
            }

            function logout() {
                disconnectWebSocket();
                showLogin();
                sessionStorage.removeItem('gh_user');
                window._lastSent = null;
                if (window._echoTimeout) clearTimeout(window._echoTimeout);
            }

            function restoreSession() {
                const stored = sessionStorage.getItem('gh_user');
                if (stored) {
                    try {
                        const user = JSON.parse(stored);
                        if (user && user.login) {
                            currentUser = user;
                            showChat();
                            connectWebSocket();
                            appendMessage(`🔁 Сессия восстановлена для ${user.login}`, true);
                            appendMessage('💡 Публичный эхо-сервер – сообщения зеркалируются обратно.', true);
                            return true;
                        }
                    } catch (e) {}
                }
                return false;
            }

            function init() {
                const handled = handleOAuthCallback();
                if (handled) return;

                const restored = restoreSession();
                if (!restored) {
                    showLogin();
                }

                loginBtn.addEventListener('click', loginWithGitHub);
                logoutBtn.addEventListener('click', logout);
                sendBtn.addEventListener('click', sendMessage);
                messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                if (currentUser && (!ws || ws.readyState === WebSocket.CLOSED)) {
                    connectWebSocket();
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
